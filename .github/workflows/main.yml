name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      user_name:
        description: 'Your name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run tests
        run: npm test
      
      - name: Run a script
        run: echo "Hello, ${{ inputs.user_name }}"
    
